[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NEXT_PUBLIC_SITE_URL = "https://www.converttables.com"

# ── non-www → www (301 permanente) ────────────────────────────
[[redirects]]
  from   = "https://converttables.com/*"
  to     = "https://www.converttables.com/:splat"
  status = 301
  force  = true

# ── Locale detection e fallback → gestiti da public/_redirects ─

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection       = "1; mode=block"

# Cache aggressiva per asset statici Next.js
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
